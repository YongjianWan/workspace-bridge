# 代码复用检测工具配置文件
# =========================

# 相似度配置
similarity:
  # 相似度阈值 (0.0 - 1.0)
  # 低于此值的函数对将被忽略
  threshold: 0.85
  
  # 强制复用阈值 (相似度 >= 此值时强制提示复用)
  force_reuse_threshold: 0.95
  
  # 建议复用阈值 (相似度 >= 此值时建议复用)
  suggest_reuse_threshold: 0.85
  
  # 相似度计算方法
  methods:
    - ast        # AST结构相似度
    - token      # Token序列相似度
    - text       # 文本相似度
    # - embedding  # 嵌入向量相似度 (需要sentence-transformers)
  
  # 各方法权重 (总和应为1.0)
  weights:
    ast: 0.4
    token: 0.3
    text: 0.3
    embedding: 0.0

# 语言配置
languages:
  typescript:
    extensions:
      - .ts
      - .tsx
    enabled: true
    
  javascript:
    extensions:
      - .js
      - .jsx
      - .mjs
    enabled: true
    
  python:
    extensions:
      - .py
    enabled: true
    
  go:
    extensions:
      - .go
    enabled: true

# 排除配置
exclusions:
  # 排除的目录
  directories:
    - node_modules
    - .git
    - __pycache__
    - .venv
    - venv
    - dist
    - build
    - coverage
    - .next
    - .nuxt
    
  # 排除的文件模式
  files:
    - '*.test.ts'
    - '*.test.js'
    - '*.test.py'
    - '*.spec.ts'
    - '*.spec.js'
    - '*.min.js'
    - '*.min.css'
    - '*.d.ts'      # TypeScript声明文件
    
  # 排除的函数名模式
  functions:
    - '__init__'    # Python构造函数
    - 'constructor' # TypeScript/JavaScript构造函数

# 输出配置
output:
  # 输出格式: markdown, json, console
  format: markdown
  
  # 输出文件路径 (null表示使用默认路径)
  output_path: null
  
  # 最大克隆对数
  max_clones: 50
  
  # 是否包含diff
  include_diff: true
  
  # diff上下文行数
  diff_context_lines: 3
  
  # 是否包含未使用导出
  include_unused_exports: true

# 性能配置
performance:
  # 并行处理线程数 (0表示使用CPU核心数)
  workers: 0
  
  # 是否使用缓存
  use_cache: true
  
  # 缓存目录
  cache_dir: '.reuse_cache'
  
  # 最大文件大小 (MB)
  max_file_size: 5

# 报告配置
report:
  # 报告标题
  title: "代码复用分析报告"
  
  # 是否包含统计信息
  include_statistics: true
  
  # 是否包含建议
  include_suggestions: true
  
  # 建议模板
  suggestion_template: |
    ## 复用建议
    
    检测到以下相似函数，建议考虑复用或重构：
    
    ### 选项1: 提取公共函数
    将相似逻辑提取到共享模块中。
    
    ### 选项2: 统一实现
    如果两个函数功能相同，保留一个实现，另一个调用它。
    
    ### 选项3: 参数化
    如果函数只有细微差别，考虑使用参数控制行为。

# CHANGE_PROOF.md模板
change_proof_template: |
  ## 复用审查记录
  
  ### 新函数: `{function_name}`
  
  **创建时间**: {timestamp}
  
  **检索结果**: 
  - [x] 已检索符号地图
  - [ ] 未检索符号地图
  
  **相似函数发现**:
  | 函数名 | 文件路径 | 相似度 | 决策 |
  |--------|----------|--------|------|
  | {similar_name} | {similar_file} | {similarity}% | {decision} |
  
  **不复用理由**: 
  {reason}
  
  **替代方案**:
  {alternative}
  
  **审查人**: @reviewer
