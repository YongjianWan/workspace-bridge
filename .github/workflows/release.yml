name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run fast tests
        run: npm run test:fast

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Pack release artifact
        run: npm pack

      - name: Smoke test packed tarball
        run: |
          set -e
          mkdir -p /tmp/wb-smoke
          tar -xzf workspace-bridge-*.tgz -C /tmp/wb-smoke
          node /tmp/wb-smoke/package/cli.js --version
          node /tmp/wb-smoke/package/cli.js workspace-info --cwd /tmp/wb-smoke/package --json --quiet

      - name: Rename artifact
        run: mv workspace-bridge-*.tgz workspace-bridge-release.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: workspace-bridge-release.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
